<html>
<body>
<p><a href='javascript:(async()=>{const t=await navigator.clipboard.readText();const m=t.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{2}|\d{4})\b/);if(!m){alert("❌ Clipboard does not contain a date in m/d/yy or m/d/yyyy format.");return;}let[_,mo,d,y]=m;mo=mo.padStart(2,"0");d=d.padStart(2,"0");const yyyy=y.length===2?`20${y}`:y;const ymd=`${yyyy}${mo}${d}`;await navigator.clipboard.writeText(ymd);const toast=document.createElement("div");toast.textContent=`✅ Copied ${ymd} to clipboard`;Object.assign(toast.style,{position:"fixed",top:"20px",right:"20px",background:"#333",color:"#fff",padding:"10px 14px",fontSize:"14px",borderRadius:"6px",zIndex:9999,opacity:"0",transition:"opacity .3s"});document.body.appendChild(toast);requestAnimationFrame(()=>toast.style.opacity="1");setTimeout(()=>{toast.style.opacity="0";setTimeout(()=>toast.remove(),300);},2000);})()'>DateTool</a>

<p><a href='javascript:(async()=>{const t=await navigator.clipboard.readText();const m=t.match(/(\+?1[\s.-]?)?(\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4})/);if(!m){alert("❌ Clipboard does not contain a valid phone number.");return;}let digits=m[0].replace(/\D/g,"");if(digits.length===11&&digits.startsWith("1"))digits=digits.slice(1);if(digits.length!==10){alert("❌ Phone number must be 10 digits.");return;}await navigator.clipboard.writeText(digits);const toast=document.createElement("div");toast.textContent=`✅ Copied ${digits} to clipboard`;Object.assign(toast.style,{position:"fixed",top:"20px",right:"20px",background:"#333",color:"#fff",padding:"10px 14px",fontSize:"14px",borderRadius:"6px",zIndex:9999,opacity:"0",transition:"opacity .3s"});document.body.appendChild(toast);requestAnimationFrame(()=>toast.style.opacity="1");setTimeout(()=>{toast.style.opacity="0";setTimeout(()=>toast.remove(),300);},2000);})()'>FaxTool</a>

<p><a href='javascript:(async()=>{try{const t=await navigator.clipboard.readText();const r=/^\s*([A-Za-z][A-Za-z\s\'\-]*[A-Za-z])\s*,\s*([A-Za-z][A-Za-z\s\'\-]*[A-Za-z])\s+(\d+)\s*$/;const m=t.match(r);if(!m){alert("❌ Clipboard text does not match:\n[Last name], [First name] [numbers]");return;}const[,last,first,nums]=m;const out=`${first} ${last} ${nums}`;await navigator.clipboard.writeText(out);const toast=document.createElement("div");toast.textContent="✅ Name reformatted and copied!";Object.assign(toast.style,{position:"fixed",top:"16px",right:"16px",background:"#323232",color:"#fff",padding:"12px 16px",borderRadius:"6px",fontSize:"14px",boxShadow:"0 4px 10px rgba(0,0,0,.3)",zIndex:99999,opacity:"0",transition:"opacity .3s ease"});document.body.appendChild(toast);requestAnimationFrame(()=>toast.style.opacity="1");setTimeout(()=>{toast.style.opacity="0";setTimeout(()=>toast.remove(),300);},2500);}catch(e){alert("⚠️ Unable to access clipboard.\nMake sure you're on a secure (https) page and try again.");}})();'>NameTool</a>
  
</body>
</html>
